events {}

http {
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/m;
  limit_req_zone $binary_remote_addr zone=poll_limit:10m rate=30r/m;

  gzip on;
  gzip_types application/json text/plain;
  gzip_min_length 256;

  upstream api_upstream {
    server api:8000;
  }

  upstream ui_upstream {
    server ui:80;
  }

  server {
    listen 80;
    server_name _;

    error_page 503 /503.json;

    location = /503.json {
      default_type application/json;
      return 503 '{"detail":"Service temporarily unavailable"}';
    }

    location = /health {
      proxy_pass http://api_upstream/health;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
      limit_req zone=poll_limit burst=5 nodelay;
      proxy_pass http://api_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/v1/recommend {
      limit_req zone=api_limit burst=1 nodelay;
      proxy_pass http://api_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /metrics {
      proxy_pass http://api_upstream/metrics;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass http://ui_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
